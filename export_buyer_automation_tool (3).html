<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buyer Automation Cloud Tool</title>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;padding:20px;background:#f4f6f9}
h1{text-align:center}
input,select,button{padding:10px;margin:5px;width:100%}
table{width:100%;margin-top:20px;border-collapse:collapse;background:white}
th,td{padding:10px;border:1px solid #ddd;text-align:left}
button{background:#25D366;color:white;border:none;cursor:pointer}
.login-box{max-width:300px;margin:100px auto;background:white;padding:20px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.2)}
.hidden{display:none}
</style>
</head>
<body>

<div id="loginSection" class="login-box">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<div id="appSection" class="hidden">
<h1>Buyer Automation Cloud Tool</h1>
<button onclick="logout()">Logout</button>

<input type="text" id="name" placeholder="Company Name">
<input type="text" id="country" placeholder="Country">
<input type="text" id="product" placeholder="Product">
<input type="text" id="phone" placeholder="Phone">

<button onclick="addLead()">Add Lead</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Country</th>
<th>Product</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
// 🔥 REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
let email = document.getElementById('email').value;
let password = document.getElementById('password').value;

auth.signInWithEmailAndPassword(email, password)
.then(()=>{
showApp();
loadLeads();
})
.catch(err=>alert(err.message));
}

// SIGNUP
function signup(){
let email = document.getElementById('email').value;
let password = document.getElementById('password').value;

auth.createUserWithEmailAndPassword(email, password)
.then(()=>alert("Account created"))
.catch(err=>alert(err.message));
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

function showApp(){
document.getElementById('loginSection').classList.add('hidden');
document.getElementById('appSection').classList.remove('hidden');
}

// ADD LEAD
function addLead(){
let lead = {
name: document.getElementById('name').value,
country: document.getElementById('country').value,
product: document.getElementById('product').value,
phone: document.getElementById('phone').value
};

db.collection("leads").add(lead).then(loadLeads);
}

// LOAD LEADS
function loadLeads(){
let table = document.getElementById('tableBody');
table.innerHTML = '';

db.collection("leads").get().then(snapshot=>{
snapshot.forEach(doc=>{
let l = doc.data();
let row = `<tr>
<td>${l.name}</td>
<td>${l.country}</td>
<td>${l.product}</td>
<td>${l.phone}</td>
<td><a href="https://wa.me/${l.phone}" target="_blank">WhatsApp</a></td>
</tr>`;
table.innerHTML += row;
});
});
}

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
if(user){
showApp();
loadLeads();
}
});
</script>

</body>
</html>
