<!DOCTYPE html>
<html lang="en">
<head>

<title>Vishnu Balaji Global Imports & Exports</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="Vishnu Balaji Global Imports & Exports is an Indian exporter of Basmati Rice, Wheat, Turmeric, Bananas and Spices supplying international buyers worldwide.">

<meta name="keywords" content="Basmati Rice Exporter India, Wheat Exporter India, Turmeric Exporter India, Banana Exporter India, Indian Spices Exporter">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
color:#051630;
}

/* NAVBAR */
header{
position:fixed;
width:100%;
padding:20px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(5,22,48,0.9);
z-index:1000;
}

.logo{display:flex;align-items:center;color:white;text-decoration:none;}
.logo img{height:45px;margin-right:10px;}
.logo h1{font-size:16px;}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
}

nav a:hover{color:#d4af37;}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
}

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.hero-overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content{position:relative;}

.hero h2{font-size:50px;margin-bottom:20px;}
.hero p{margin-bottom:20px;}

.btn-main{
background:#d4af37;
padding:12px 25px;
text-decoration:none;
color:#051630;
margin:5px;
display:inline-block;
}

/* PRODUCTS */
.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.product-card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.product-card img{
width:100%;
height:200px;
object-fit:cover;
}

.ask-btn{
background:#d4af37;
padding:10px 20px;
display:inline-block;
margin-top:10px;
text-decoration:none;
color:#051630;
}

/* CONTACT */
.contact-wrapper{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
padding:40px;
}

.contact-form input,
.contact-form textarea,
.contact-form select{
width:100%;
padding:10px;
margin:10px 0;
}

/* WHATSAPP PREMIUM */
.whatsapp-btn{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(135deg,#25D366,#128C7E);
color:white;
padding:14px 20px;
border-radius:50px;
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
text-decoration:none;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
z-index:999;
animation:pulse 2s infinite;
}

.whatsapp-btn img{
width:40px;
height:40px;
}

.whatsapp-btn:hover{
transform:scale(1.1);
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(37,211,102,0.6);}
70%{box-shadow:0 0 0 15px rgba(37,211,102,0);}
100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

/* MOBILE */
@media(max-width:768px){
.contact-wrapper{grid-template-columns:1fr;}
.whatsapp-btn span{display:none;}
}

</style>
</head>

<body>

<header>
<a href="#" class="logo">
<img src="images/logo.png">
<h1>Vishnu Balaji Global</h1>
</a>

<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#products">Products</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section id="home" class="hero">
<video autoplay muted loop>

</video>

<div class="hero-overlay"></div>

<div class="hero-content">
<h2>Bridging Continents via Indian Excellence</h2>
<p>Premium Export Products</p>

<a href="#products" class="btn-main">Products</a>
<a href="#contact" class="btn-main">Contact</a>
</div>
</section>

<section id="products">
<h2 style="text-align:center">Products</h2>

<div class="products-grid">

<div class="product-card">
<img src="images/wheat.jpg">
<h3>Wheat</h3>
<a href="https://api.whatsapp.com/send?phone=919160666483&text=Wheat Inquiry" class="ask-btn">Ask Price</a>
</div>

<div class="product-card">
<img src="images/bananas.jpg">
<h3>Bananas</h3>
<a href="https://api.whatsapp.com/send?phone=919160666483&text=Banana Inquiry" class="ask-btn">Ask Price</a>
</div>

</div>
</section>

<section id="contact">
<h2 style="text-align:center">Contact</h2>

<div class="contact-wrapper">

<div>
<p>📞 +91 9160666483</p>
<p>📧 depu.sep13@gmail.com</p>
</div>

<form class="contact-form">
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>
<button>Send</button>
</form>

</div>
</section>

<!-- WHATSAPP BUTTON -->
<a href="https://api.whatsapp.com/send?phone=919160666483&text=Hello%20I%20am%20interested%20in%20your%20products" 
class="whatsapp-btn" target="_blank">

<img src="images/whatsapp.png">
<span>Chat with us</span>

</a>

</body>
</html>
